			--lg2: linear-gradient(transparent 0px calc(var(--l2)), var(--sw-c1) calc(var(--l2)) calc(var(--l2) + 2px), transparent calc(var(--l2) + 2px));
			--lg3: linear-gradient(transparent 0px calc(var(--l3)), var(--sw-c1) calc(var(--l3)) calc(var(--l3) + 2px), transparent calc(var(--l3) + 2px));

			--lg7: linear-gradient(transparent 0px calc(var(--l7)), var(--sw-c1) calc(var(--l7)) calc(var(--l7) + 2px), transparent calc(var(--l7) + 2px));
			--lg8: linear-gradient(transparent 0px calc(var(--l8)), var(--sw-c1) calc(var(--l8)) calc(var(--l8) + 2px), transparent calc(var(--l8) + 2px));
			--lg9: linear-gradient(transparent 0px calc(var(--l9)), var(--sw-c1) calc(var(--l9)) calc(var(--l9) + 2px), transparent calc(var(--l9) + 2px));
			background: var(--lgDepth),

				var(--mtn) center 60% / min(75vh, 75vw) no-repeat,
				var(--mtn2) center 60% / min(75vh, 75vw) repeat-x,

		}

		/* ══ APP THEME — DARK GLASS ═══════════════════════════════════ */
		:root {
			--bg: transparent;
			--bg-bar: rgba(10, 5, 28, 0.82);
			--bg-glass: rgba(10, 5, 28, 0.70);
			--bg-line: rgba(15, 8, 40, 0.60);

			--border: rgba(100, 60, 180, 0.35);
			--border-md: rgba(140, 80, 220, 0.50);
			--border-str: rgba(200, 100, 255, 0.70);

			/* All text goes light on dark background */
			--ink: #f0e8ff;
			--ink2: #c8b8e8;
			--muted: rgba(160, 130, 200, 0.75);

			/* Accent: hot magenta / synthwave pink */
			--accent: hsl(319, 100%, 60%);
			--accent-border: hsl(319, 100%, 60%);
			--accent-bg: rgba(255, 30, 180, 0.12);

			/* Segment colors — brighter for dark bg */
			--c0: #ff6b8a;
			--c1: #6ef07a;
			--c2: #5bc8ff;
			--c3: #ffb347;
			--c4: #39e8b0;
			--c5: #d49aff;
			--cc: rgba(160, 130, 200, 0.75);
			--cat: #b8e878;
			--red: #ff5555;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0
		}

		html {
			font-size: 15px
		}

		body {
			font-family: 'Courier Prime', monospace;
			background: transparent;
			color: var(--ink);
			min-height: 100vh;
			overflow-x: hidden;
			-webkit-text-size-adjust: 100%;
			position: relative;
			z-index: 1;
		}

		/* ══ TOP BAR ══════════════════════════════════════════════════ */
		#topbar {
			position: sticky;
			top: 0;
			z-index: 200;
			background: rgba(6, 3, 22, 0.96);
			backdrop-filter: blur(28px) saturate(160%);
			-webkit-backdrop-filter: blur(28px) saturate(160%);
			border-bottom: 1.5px solid var(--border-str);
			box-shadow: 0 2px 32px rgba(0, 0, 0, 0.50), 0 1px 0 rgba(180, 80, 255, 0.20);
			display: flex;
			align-items: center;
			gap: .4em;
			flex-wrap: nowrap;
			padding: 0 .8em;
			height: 42px;
			overflow: hidden;
		}

		/* On smaller screens let it wrap but keep height auto */
		@media (max-width: 800px) {
			#topbar {
				flex-wrap: wrap;
				height: auto;
				padding: .35em .8em;
			}

			#status {
				order: 99
			}
		}

		.logo {
			font-family: 'Playfair Display', serif;
			font-weight: 600;
			font-size: 1.05em;
			color: var(--ink);
			white-space: nowrap;
			margin-right: .2em;
			flex-shrink: 0;
			text-shadow: 0 0 18px rgba(255, 60, 200, 0.55);
		}

		.logo sub {
			font-family: 'Bebas Neue', sans-serif;
			font-size: .44em;
			color: var(--muted);
			letter-spacing: .16em;
			vertical-align: middle;
			margin-left: .4em;
		}

		.topbar-sep {
			flex-shrink: 0;
			width: 1px;
			height: 22px;
			background: var(--border-str);
			margin: 0 .2em;
			opacity: 0.5;
		}

		.topbar-spacer {
			flex: 1;
			min-width: 0
		}

		/* ── Buttons ── */
		.btn {
			font-family: 'Courier Prime', monospace;
			font-size: .63em;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: .06em;
			padding: .32em .8em;
			border: 1.5px solid var(--border-md);
			background: rgba(10, 5, 28, 0.50);
			color: var(--ink2);
			cursor: pointer;
			transition: border-color .12s, color .12s, background .12s, box-shadow .12s;
			white-space: nowrap;
			height: 28px;
			line-height: 1;
			flex-shrink: 0;
		}

		.btn:hover,
		.btn:active {
			border-color: var(--accent-border);
			color: var(--accent);
			background: var(--accent-bg);
			box-shadow: 0 0 10px rgba(255, 30, 180, 0.25);
		}

		.btn.primary {
			border-color: var(--accent);
			background: rgba(255, 30, 180, 0.25);
			color: var(--accent);
			box-shadow: 0 0 12px rgba(255, 30, 180, 0.30);
		}

		.btn.primary:hover,
		.btn.primary:active {
			background: rgba(255, 30, 180, 0.40);
			border-color: var(--accent);
			box-shadow: 0 0 20px rgba(255, 30, 180, 0.50);
		}

		.btn.on {
			border-color: var(--accent-border);
			background: var(--accent-bg);
			color: var(--accent);
			box-shadow: 0 0 10px rgba(255, 30, 180, 0.20);
		}

		#topbar input {
			font-family: 'Courier Prime', monospace;
			font-size: max(.63em, 15px);
			padding: 0 .7em;
			border: 1.5px solid var(--border-md);
			background: rgba(10, 5, 28, 0.60);
			color: var(--ink);
			width: 9em;
			outline: none;
			height: 28px;
			flex-shrink: 0;
			transition: border-color .12s, box-shadow .12s;
		}

		#topbar input::placeholder {
			color: var(--muted)
		}

		#topbar input:focus {
			border-color: var(--accent-border);
			box-shadow: 0 0 8px rgba(255, 30, 180, 0.25);
		}

		#status {
			font-size: .6em;
			color: var(--muted);
			letter-spacing: .04em;
			white-space: nowrap;
			flex-shrink: 0;
		}

		#status.ok {
			color: var(--c4)
		}

		#status.err {
			color: var(--red)
		}

		/* ══ LEGEND ═══════════════════════════════════════════════════ */
		#legend {
			display: flex;
			gap: .4em;
			flex-wrap: wrap;
			align-items: center;
			padding: .3em .8em;
			background: rgba(6, 3, 22, 0.96);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border-bottom: 1px solid var(--border);
			font-size: .57em;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: .06em;
			position: sticky;
			top: 42px;
			z-index: 190;
			box-shadow: 0 2px 16px rgba(0, 0, 0, 0.50);
		}

		.leg {
			padding: .15em .52em;
			border: 1.5px solid;
			white-space: nowrap;
		}

		#legend-hint {
			margin-left: auto;
			color: var(--muted);
			font-weight: 400;
			text-transform: none;
			letter-spacing: 0;
			white-space: nowrap;
		}

		/* ══ PANELS ═══════════════════════════════════════════════════ */
		.panel {
			display: none
		}

		.panel.active {
			display: block
		}

		#editor-wrap {
			padding: .4em 0 6em;
			/* Thin dark strip behind lines so the bg shows at sides */
			background: linear-gradient(to right,
					transparent 0%,
					rgba(4, 2, 18, 0.30) 2%,
					rgba(4, 2, 18, 0.30) 98%,
					transparent 100%);
		}

		/* ══ LINE ROW ═════════════════════════════════════════════════ */
		.line {
			display: flex;
			align-items: flex-start;
			min-height: 1.4em;
			position: relative;
			transition: background .10s;
			background: rgba(6, 3, 22, 0);
			border-bottom: 1px solid rgba(80, 40, 140, 0.18);
		}

		.line:not(.editing):hover {
			background: rgba(30, 12, 68, 0.92);
		}

		.line.expanded:not(.editing) {
			background: rgba(22, 8, 58, 0.96);
			outline: 1.5px solid var(--border-md);
			outline-offset: -1px;
		}

		.line.editing {
			background: rgba(14, 5, 42, 0.98);
			outline: 2px solid var(--accent);
			outline-offset: -1px;
			cursor: default;
			box-shadow: 0 0 24px rgba(255, 30, 180, 0.10) inset;
		}

		.line.drag-ghost-over {
			outline: 2px solid var(--accent);
			outline-offset: -1px;
		}

		.line.dragging {
			opacity: .15
		}

		.handle {
			flex-shrink: 0;
			width: 1.6em;
			align-self: stretch;
			display: flex;
			align-items: flex-start;
			justify-content: center;
			padding-top: .42em;
			color: transparent;
			font-size: .75em;
			user-select: none;
			transition: color .12s;
			cursor: grab;
			touch-action: none;
		}

		.line:hover .handle {
			color: var(--border-str)
		}

		.line-accent {
			flex-shrink: 0;
			width: 3px;
			align-self: stretch;
			margin-right: .55em;
		}

		.line-content-col {
			flex: 1;
			min-width: 0;
			display: flex;
			flex-direction: column
		}

		/* ── Preview ── */
		.line-preview {
			display: flex;
			align-items: flex-start;
			min-height: 1.4em;
			overflow: hidden;
			position: relative;
			cursor: pointer;
		}

		.line-colored-preview {
			padding: .22em .3em .22em 0;
			pointer-events: none;
			user-select: none;
			white-space: pre;
			overflow: hidden;
			flex: 1;
			min-width: 0;
		}

		.line.expanded .line-colored-preview {
			white-space: pre-wrap;
			word-break: break-word;
			overflow: visible
		}

		.line.expanded .line-preview {
			overflow: visible
		}

		.line-fade {
			position: absolute;
			right: 0;
			top: 0;
			bottom: 0;
			width: 3.5em;
			pointer-events: none;
			background: linear-gradient(to right, transparent, rgba(6, 3, 22, 0.82) 90%);
			transition: opacity .15s;
		}

		.line:hover .line-fade {
			background: linear-gradient(to right, transparent, rgba(30, 12, 68, 0.92) 90%)
		}

		.line.expanded .line-fade {
			opacity: 0;
			pointer-events: none
		}

		.line.editing .line-fade {
			background: linear-gradient(to right, transparent, rgba(14, 5, 42, 0.98) 90%)
		}

		/* ── Edit row ── */
		.line-edit-row {
			display: none;
			flex-direction: column;
			padding: .3em .3em .4em 0;
			border-top: 1px solid var(--border);
			margin-top: .15em;
			font-size: 14px;
		}

		.line.editing .line-edit-row {
			display: flex
		}

		.line-ce {
			font-family: 'Courier Prime', monospace;
			font-size: 15px;
			line-height: 1.55;
			word-break: break-all;
			white-space: pre-wrap;
			padding: .4em .65em;
			border: 1.5px solid var(--border-md);
			background: rgba(10, 5, 28, 0.80);
			outline: none;
			width: 100%;
			caret-color: var(--accent);
			min-height: 2em;
			cursor: text;
			color: var(--ink);
			transition: border-color .12s, box-shadow .12s;
		}

		.line-ce:focus {
			border-color: var(--accent-border);
			box-shadow: 0 0 10px rgba(255, 30, 180, 0.20) inset;
		}

		/* ── Segment colors ── */
		.s0 {
			color: var(--c0);
			font-style: italic
		}

		.s1 {
			color: var(--c1);
			font-style: italic
		}

		.s2 {
			color: var(--c2);
			font-weight: 700
		}

		.s3 {
			color: var(--c3)
		}

		.s4 {
			color: var(--c4)
		}

		.s5 {
			color: var(--c5)
		}

		.sc {
			color: var(--cc);
			font-style: italic
		}

		.su {
			color: rgba(160, 130, 200, 0.60)
		}

		.sa {
			color: var(--cat);
			font-style: italic
		}

		.serr {
			color: var(--red);
			font-weight: 700
		}

		.line-edit-actions {
			display: flex;
			gap: .5em;
			align-items: center;
			padding-top: .3em;
			font-size: 14px;
		}

		.line-edit-hint {
			font-size: 11px;
			color: var(--muted);
			flex: 1;
			white-space: nowrap
		}

		/* ── Controls bar ── */
		.line-controls {
			display: none;
			align-items: center;
			gap: .3em;
			padding: .2em .3em .2em 0;
			border-bottom: 1px solid var(--border);
			margin-bottom: .1em;
			font-size: 14px;
		}

		.line.expanded .line-controls,
		.line.editing .line-controls {
			display: flex
		}

		.line-type-label {
			font-size: 10px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: .10em;
			padding: 0 .3em 0 0;
			flex: 1;
			white-space: nowrap;
		}

		.line-ctrl-btn {
			flex-shrink: 0;
			background: rgba(10, 5, 28, 0.50);
			border: 1.5px solid var(--border);
			font-size: 13px;
			cursor: pointer;
			padding: .3em .5em;
			transition: all .12s;
			line-height: 1;
			min-width: 2.3em;
			min-height: 2.2em;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--ink2);
		}

		.line-ctrl-btn:hover,
		.line-ctrl-btn:active {
			border-color: var(--accent-border);
			background: var(--accent-bg);
			color: var(--accent);
			box-shadow: 0 0 8px rgba(255, 30, 180, 0.20);
		}

		.line.editing .line-edit-btn {
			border-color: var(--accent-border);
			background: var(--accent-bg);
			color: var(--accent);
		}

		.line-del:hover,
		.line-del:active {
			color: var(--red) !important;
			border-color: var(--red) !important;
			background: rgba(255, 85, 85, 0.12) !important;
		}

		#add-bar {
			display: flex;
			gap: .5em;
			flex-wrap: wrap;
			justify-content: center;
			margin-top: 1.5em;
			padding: 0 1em;
		}

		/* ══ RAW PANEL ════════════════════════════════════════════════ */
		#raw-wrap {
			height: calc(100vh - 88px)
		}

		#raw-textarea {
			width: 100%;
			height: 100%;
			background: rgba(6, 3, 22, 0.96);
			color: var(--ink);
			font-family: 'Courier Prime', monospace;
			font-size: .88em;
			border: none;
			outline: none;
			padding: 1em;
			resize: none;
			line-height: 1.65;
			tab-size: 2;
		}

		/* ══ DIFF PANEL ═══════════════════════════════════════════════ */
		#diff-wrap {
			padding: 1em 1em 4em;
			font-family: 'Courier Prime', monospace;
			font-size: .82em;
			line-height: 1.65;
			background: rgba(6, 3, 22, 0.90);
			min-height: calc(100vh - 88px);
		}

		.diff-line {
			display: block;
			padding: .05em .4em;
			white-space: pre-wrap;
			word-break: break-all;
		}

		.diff-add {
			background: rgba(62, 232, 176, 0.12);
			color: #39e8b0
		}

		.diff-del {
			background: rgba(255, 85, 85, 0.12);
			color: #ff5555;
			text-decoration: line-through
		}

		.diff-same {
			color: var(--muted)
		}

		::-webkit-scrollbar {
			width: 5px
		}

		::-webkit-scrollbar-track {
			background: rgba(6, 3, 22, 0.80)
		}

		::-webkit-scrollbar-thumb {
			background: var(--border-md);
		}

		::-webkit-scrollbar-thumb:hover {
			background: var(--border-str)
		}
	</style>
</head>

<body>

	<div id="topbar">
		<div class="logo">Brume <sub>editor</sub></div>
		<div class="topbar-sep"></div>
		<button class="btn on" id="btn-visual" onclick="switchPanel('visual')">✦ Visuel</button>
		<button class="btn" id="btn-raw" onclick="switchPanel('raw')">⌨ Brut</button>
		<button class="btn" id="btn-diff" onclick="switchPanel('diff')">⟳ Diff</button>
		<div class="topbar-sep"></div>
		<button class="btn" onclick="copyMenu()">⧉ Copier</button>
		<button class="btn" onclick="window.open('menu.html','_blank')">↗ Menu</button>
		<button class="btn" id="btn-fullscreen" onclick="toggleFullscreen()" title="Plein écran">⛶</button>
		<div class="topbar-sep"></div>
		<input type="email" id="emailBox" placeholder="email" autocomplete="on">
		<input type="password" id="passwordBox" placeholder="mot de passe" autocomplete="on">
		<button class="btn primary" onclick="pushToSupabase()">↑ Push</button>
		<div class="topbar-sep"></div>
		<div id="status"></div>
	</div>

	<div id="legend">
		<span class="leg" style="border-color:var(--c0);color:var(--c0)">bloc</span>
		<span class="leg" style="border-color:var(--c1);color:var(--c1)">_ catégorie</span>
		<span class="leg" style="border-color:var(--c2);color:var(--c2)">__ produit</span>
		<span class="leg" style="border-color:var(--c3);color:var(--c3)">___ prix</span>
		<span class="leg" style="border-color:var(--c4);color:var(--c4)">____ description</span>
		<span class="leg" style="border-color:var(--c5);color:var(--c5)">_____ commentaire</span>
		<span class="leg" style="border-color:var(--cc);color:var(--cc)"># commenté</span>
		<span id="legend-hint">tap = voir · ✎ = modifier · ⠿ = déplacer</span>
	</div>

	<div id="panel-visual" class="panel active">
		<div id="editor-wrap">
			<div id="lines-container"></div>
			<div id="add-bar">
				<button class="btn" onclick="insertLine(null,'')">＋ Vide</button>
				<button class="btn" onclick="insertLine(null,'Nouveau Bloc')">＋ Bloc</button>
				<button class="btn" onclick="insertLine(null,'_')">＋ Catégorie</button>
				<button class="btn" onclick="insertLine(null,'__')">＋ Produit</button>
				<button class="btn" onclick="insertLine(null,'_____')">＋ Commentaire</button>
			</div>
		</div>
	</div>

	<div id="panel-raw" class="panel">
		<div id="raw-wrap"><textarea id="raw-textarea" spellcheck="false"></textarea></div>
	</div>
	<div id="panel-diff" class="panel">
		<div id="diff-wrap"></div>
	</div>

	<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
	<script>
		const SupabaseUrl = "https://cpvxjedlgjhcdqjyecmf.supabase.co";
		const SupabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwdnhqZWRsZ2poY2RxanllY21mIiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTkyNjMzMzYsImV4cCI6MjAxNDgzOTMzNn0.Rs-bqvUb0Eq7NEKX3tFc8WHJOjzk1Rc4fgRRU6OtVNs";
		let _sb;
		try { _sb = supabase.createClient(SupabaseUrl, SupabaseKey); } catch (e) { }

		let rawLines = [], savedText = '';

		const SIZES = ['1.12em', '0.97em', '0.90em', '0.82em', '0.82em', '0.78em'];
		const LABELS = ['bloc', 'catégorie', 'produit', 'prix', 'description', 'commentaire'];
		const COLORS = ['var(--c0)', 'var(--c1)', 'var(--c2)', 'var(--c3)', 'var(--c4)', 'var(--c5)'];

		function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }

		function colorize(raw) {
			if (!raw || raw.trim() === '') return '';
			if (raw.trim().startsWith('#')) return `<span class="sc">${esc(raw)}</span>`;
			let lvl = 0; while (raw[lvl] === '_') lvl++;
			const leadingU = raw.slice(0, lvl), body = raw.slice(lvl), segs = body.split('_');
			let html = '';
			if (leadingU) {
				const okU = leadingU.slice(0, 5), errU = leadingU.slice(5);
				if (okU) html += `<span class="su">${esc(okU)}</span>`;
				if (errU) html += `<span class="serr">${esc(errU)}</span>`;
			}
			segs.forEach((seg, i) => {
				const rl = lvl + i;
				if (i > 0) { const sc = rl > 5 ? 'serr' : 'su'; html += `<span class="${sc}">_</span>`; }
				const cls = rl > 5 ? 'serr' : `s${Math.min(rl, 5)}`;
				const ap = seg.split('@');
				html += `<span class="${cls}">${esc(ap[0])}</span>`;
				for (let j = 1; j < ap.length; j++) html += `<span class="${rl > 5 ? 'serr' : 'sa'}">@${esc(ap[j])}</span>`;
			});
			return html;
		}

		function lineInfo(raw) {
			if (!raw || raw.trim() === '') return { color: 'transparent', label: '', size: '0.88em' };
			if (raw.trim().startsWith('#')) return { color: 'var(--cc)', label: '#', size: '0.80em' };
			let lvl = 0; while (raw[lvl] === '_') lvl++; lvl = Math.min(lvl, 5);
			return { color: COLORS[lvl], label: LABELS[lvl], size: SIZES[lvl] };
		}

		function getCaretOffset(el) {
			const sel = window.getSelection(); if (!sel || sel.rangeCount === 0) return 0;
			const range = sel.getRangeAt(0), pre = range.cloneRange();
			pre.selectNodeContents(el); pre.setEnd(range.endContainer, range.endOffset);
			return pre.toString().length;
		}
		function setCaretOffset(el, offset) {
			const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
			let rem = offset, node;
			while ((node = walker.nextNode())) {
				if (rem <= node.textContent.length) {
					const r = document.createRange(); r.setStart(node, rem); r.collapse(true);
					const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r); return;
				}
				rem -= node.textContent.length;
			}
			const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
			window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
		}
		function getCEText(el) { return el.innerText.replace(/\n/g, '') }
		function setCEContent(el, raw) { el.innerHTML = colorize(raw) }

		function renderAll() {
			const c = document.getElementById('lines-container'); c.innerHTML = '';
			rawLines.forEach((t, i) => c.appendChild(buildLineEl(t, i)));
		}

		function buildLineEl(text, idx) {
			const { color, label, size } = lineInfo(text);
			const line = document.createElement('div');
			line.className = 'line'; line.dataset.idx = idx;

			const handle = document.createElement('span');
			handle.className = 'handle'; handle.textContent = '⠿'; line.appendChild(handle);

			const accent = document.createElement('div');
			accent.className = 'line-accent'; accent.style.background = color; line.appendChild(accent);

			const col = document.createElement('div');
			col.className = 'line-content-col'; col.style.fontSize = size;

			const preview = document.createElement('div'); preview.className = 'line-preview';
			const cp = document.createElement('div'); cp.className = 'line-colored-preview'; cp.innerHTML = colorize(text);
			const fade = document.createElement('div'); fade.className = 'line-fade';
			preview.appendChild(cp); preview.appendChild(fade); col.appendChild(preview);

			const editRow = document.createElement('div'); editRow.className = 'line-edit-row';
			const ce = document.createElement('div');
			ce.className = 'line-ce'; ce.contentEditable = 'true'; ce.spellcheck = false;
			ce.setAttribute('autocorrect', 'off'); ce.setAttribute('autocapitalize', 'off');
			setCEContent(ce, text);

			const actRow = document.createElement('div'); actRow.className = 'line-edit-actions';
			const hint = document.createElement('span'); hint.className = 'line-edit-hint'; hint.textContent = '↵ valider · esc annuler';
			const btnCancel = document.createElement('button'); btnCancel.className = 'btn'; btnCancel.textContent = 'Annuler';
			const btnConfirm = document.createElement('button'); btnConfirm.className = 'btn primary'; btnConfirm.textContent = '✓ Valider';
			actRow.appendChild(hint); actRow.appendChild(btnCancel); actRow.appendChild(btnConfirm);
			editRow.appendChild(ce); editRow.appendChild(actRow); col.appendChild(editRow);
			line.appendChild(col);

			const controls = document.createElement('div'); controls.className = 'line-controls';
			const typeLabel = document.createElement('span'); typeLabel.className = 'line-type-label';
			typeLabel.style.color = color; typeLabel.textContent = label; controls.appendChild(typeLabel);

			const editBtn = document.createElement('button'); editBtn.className = 'line-ctrl-btn line-edit-btn';
			editBtn.textContent = '✎'; editBtn.title = 'Modifier';
			editBtn.addEventListener('click', e => {
				e.stopPropagation();
				if (line.classList.contains('editing')) applyClose(line, true); else openEditHere();
			});
			controls.appendChild(editBtn);

			const insertBtn = document.createElement('button'); insertBtn.className = 'line-ctrl-btn line-insert-btn';
			insertBtn.textContent = '＋'; insertBtn.title = 'Insérer en dessous';
			insertBtn.addEventListener('click', e => {
				e.stopPropagation(); line.classList.remove('expanded');
				const val = rawLines[idx]; let prefix = '';
				for (let i = 0; i < val.length; i++) { if (val[i] === '_') prefix += '_'; else break; }
				insertLine(idx, prefix); setTimeout(() => openEdit(idx + 1), 30);
			});
			controls.appendChild(insertBtn);

			const del = document.createElement('button'); del.className = 'line-ctrl-btn line-del';
			del.textContent = '✕'; del.title = 'Supprimer';
			del.addEventListener('click', e => { e.stopPropagation(); rawLines.splice(idx, 1); renderAll(); });
			controls.appendChild(del);

			col.insertBefore(controls, preview);

			ce.addEventListener('input', () => {
				const caret = getCaretOffset(ce), raw = getCEText(ce);
				setCEContent(ce, raw); setCaretOffset(ce, caret);
				cp.innerHTML = colorize(raw);
				const info = lineInfo(raw);
				accent.style.background = info.color; col.style.fontSize = info.size;
				typeLabel.textContent = info.label; typeLabel.style.color = info.color;
			});
			ce.addEventListener('keydown', e => {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault(); applyClose(line, true);
					const val = rawLines[idx]; let prefix = '';
					for (let i = 0; i < val.length; i++) { if (val[i] === '_') prefix += '_'; else break; }
					insertLine(idx, prefix); setTimeout(() => openEdit(idx + 1), 30);
				} else if (e.key === 'Escape') {
					e.preventDefault(); applyClose(line, false);
				} else if (e.key === 'Backspace' && getCEText(ce) === '') {
					e.preventDefault(); applyClose(line, false); rawLines.splice(idx, 1); renderAll();
				}
			});
			ce.addEventListener('paste', e => {
				e.preventDefault();
				const plain = (e.clipboardData || window.clipboardData).getData('text/plain').replace(/\r?\n/g, '');
				const caret = getCaretOffset(ce), cur = getCEText(ce);
				const next = cur.slice(0, caret) + plain + cur.slice(caret);
				setCEContent(ce, next); setCaretOffset(ce, caret + plain.length);
				cp.innerHTML = colorize(next);
				const info = lineInfo(next);
				accent.style.background = info.color; col.style.fontSize = info.size;
				typeLabel.textContent = info.label; typeLabel.style.color = info.color;
			});

			function openEditHere() {
				document.querySelectorAll('.line.editing').forEach(l => { if (l !== line) applyClose(l, true); });
				document.querySelectorAll('.line.expanded').forEach(l => l.classList.remove('expanded'));
				setCEContent(ce, rawLines[idx]); cp.innerHTML = colorize(rawLines[idx]);
				line.classList.add('editing');
				setTimeout(() => {
					ce.focus();
					const r = document.createRange(); r.selectNodeContents(ce); r.collapse(false);
					const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
					line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
				}, 30);
			}

			btnConfirm.addEventListener('click', e => { e.stopPropagation(); applyClose(line, true); });
			btnCancel.addEventListener('click', e => { e.stopPropagation(); applyClose(line, false); });

			let pdY = 0, pdT = 0;
			line.addEventListener('pointerdown', e => { pdY = e.clientY; pdT = Date.now(); }, { passive: true });
			line.addEventListener('pointerup', e => {
				if (line.classList.contains('editing')) return;
				if (e.target.closest('.line-ctrl-btn,.handle')) return;
				if (Math.abs(e.clientY - pdY) < 8 && (Date.now() - pdT) < 500) line.classList.toggle('expanded');
			});
			document.addEventListener('pointerdown', e => {
				if (!line.contains(e.target)) {
					if (line.classList.contains('editing')) applyClose(line, true);
					if (line.classList.contains('expanded')) line.classList.remove('expanded');
				}
			}, { capture: true, passive: true });

			setupDrag(handle, line, idx);
			return line;
		}

		function applyClose(targetLine, doSave) {
			const ce = targetLine.querySelector('.line-ce');
			const tIdx = parseInt(targetLine.dataset.idx);
			if (doSave && ce && !isNaN(tIdx)) {
				const val = getCEText(ce); rawLines[tIdx] = val;
				const info = lineInfo(val);
				targetLine.querySelector('.line-colored-preview').innerHTML = colorize(val);
				setCEContent(ce, val);
				targetLine.querySelector('.line-accent').style.background = info.color;
				targetLine.querySelector('.line-content-col').style.fontSize = info.size;
				const lbl = targetLine.querySelector('.line-type-label');
				lbl.textContent = info.label; lbl.style.color = info.color;
			}
			targetLine.classList.remove('editing');
		}

		function openEdit(idx) {
			const lineEl = document.querySelector(`.line[data-idx="${idx}"]`); if (!lineEl) return;
			document.querySelectorAll('.line.editing').forEach(l => { if (l !== lineEl) applyClose(l, true); });
			const ce = lineEl.querySelector('.line-ce');
			setCEContent(ce, rawLines[idx] || '');
			lineEl.querySelector('.line-colored-preview').innerHTML = colorize(rawLines[idx] || '');
			lineEl.classList.add('editing');
			setTimeout(() => {
				ce.focus();
				const r = document.createRange(); r.selectNodeContents(ce); r.collapse(false);
				const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
				lineEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
			}, 30);
		}

		function insertLine(afterIdx, text = '') {
			if (afterIdx === null) rawLines.push(text);
			else rawLines.splice(afterIdx + 1, 0, text);
			renderAll();
			setTimeout(() => openEdit(afterIdx === null ? rawLines.length - 1 : afterIdx + 1), 30);
		}

		/* ── DRAG ── */
		let dragState = null;
		function setupDrag(handle, lineEl, idx) {
			handle.addEventListener('mousedown', e => startDrag(e.clientY, lineEl, idx, 'mouse'));
			handle.addEventListener('touchstart', e => startDrag(e.touches[0].clientY, lineEl, idx, 'touch'), { passive: true });
		}
		function startDrag(clientY, lineEl, idx, type) {
			const rect = lineEl.getBoundingClientRect();
			const ghost = lineEl.cloneNode(true);
			ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.92;z-index:999;background:rgba(20,8,50,0.92);border:2px solid var(--accent);pointer-events:none;box-shadow:0 4px 20px rgba(255,30,180,.25)`;
			document.body.appendChild(ghost);
			lineEl.classList.add('dragging');
			dragState = { srcIdx: idx, ghost, lineEl, offsetY: clientY - rect.top };
			if (type === 'touch') {
				document.addEventListener('touchmove', onTouchMove, { passive: false });
				document.addEventListener('touchend', onTouchEnd, { once: true });
			}
		}
		function moveDrag(clientY) {
			if (!dragState) return;
			dragState.ghost.style.top = (clientY - dragState.offsetY) + 'px';
			document.querySelectorAll('.line.drag-ghost-over').forEach(l => l.classList.remove('drag-ghost-over'));
			const t = getLineAtY(clientY);
			if (t && t !== dragState.lineEl) t.classList.add('drag-ghost-over');
		}
		function endDrag(clientY) {
			if (!dragState) return;
			const { srcIdx, ghost, lineEl } = dragState;
			ghost.remove(); lineEl.classList.remove('dragging');
			document.querySelectorAll('.line.drag-ghost-over').forEach(l => l.classList.remove('drag-ghost-over'));
			const t = getLineAtY(clientY);
			if (t && t !== lineEl) {
				const destIdx = parseInt(t.dataset.idx);
				if (!isNaN(destIdx) && destIdx !== srcIdx) {
					const before = clientY < t.getBoundingClientRect().top + t.getBoundingClientRect().height / 2;
					const moved = rawLines.splice(srcIdx, 1)[0];
					let dest = srcIdx < destIdx ? destIdx - 1 : destIdx;
					if (!before) dest++;
					rawLines.splice(dest, 0, moved); renderAll();
				}
			}
			dragState = null;
		}
		document.addEventListener('mousemove', e => moveDrag(e.clientY));
		document.addEventListener('mouseup', e => endDrag(e.clientY));
		function onTouchMove(e) { e.preventDefault(); moveDrag(e.touches[0].clientY); }
		function onTouchEnd(e) { endDrag(e.changedTouches[0].clientY); document.removeEventListener('touchmove', onTouchMove); }
		function getLineAtY(y) {
			for (const el of document.querySelectorAll('.line')) {
				const r = el.getBoundingClientRect();
				if (y >= r.top && y <= r.bottom) return el;
			}
			return null;
		}

		function switchPanel(name) {
			['visual', 'raw', 'diff'].forEach(p => {
				document.getElementById(`panel-${p}`).classList.toggle('active', p === name);
				document.getElementById(`btn-${p}`).classList.toggle('on', p === name);
			});
			if (name === 'raw') document.getElementById('raw-textarea').value = getText();
			if (name === 'diff') renderDiff();
		}
		document.getElementById('raw-textarea').addEventListener('input', () => {
			rawLines = document.getElementById('raw-textarea').value.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
		});

		function renderDiff() {
			const orig = savedText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
			const wrap = document.getElementById('diff-wrap');
			if (orig.join('\n') === rawLines.join('\n')) { wrap.innerHTML = '<span style="color:var(--muted)">Aucune modification.</span>'; return; }
			wrap.innerHTML = lcs(orig.slice(0, 400), rawLines.slice(0, 400)).map(d =>
				`<span class="diff-line diff-${d.type}">${d.type === 'add' ? '＋' : d.type === 'del' ? '－' : '　'} ${esc(d.text)}</span>`
			).join('\n');
		}
		function lcs(a, b) {
			const m = a.length, n = b.length;
			const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
			for (let i = m - 1; i >= 0; i--) for (let j = n - 1; j >= 0; j--)
				dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
			const r = []; let i = 0, j = 0;
			while (i < m || j < n) {
				if (i < m && j < n && a[i] === b[j]) { r.push({ type: 'same', text: a[i] }); i++; j++; }
				else if (j < n && (i >= m || dp[i][j + 1] >= dp[i + 1][j])) { r.push({ type: 'add', text: b[j] }); j++; }
				else { r.push({ type: 'del', text: a[i] }); i++; }
			}
			return r;
		}

		function toggleFullscreen() {
			const btn = document.getElementById('btn-fullscreen');
			if (!document.fullscreenElement && !document.webkitFullscreenElement) {
				const el = document.documentElement;
				if (el.requestFullscreen) el.requestFullscreen();
				else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
				btn.classList.add('on');
			} else {
				if (document.exitFullscreen) document.exitFullscreen();
				else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
				btn.classList.remove('on');
			}
		}
		document.addEventListener('fullscreenchange', () => {
			const btn = document.getElementById('btn-fullscreen');
			if (!document.fullscreenElement) btn.classList.remove('on'); else btn.classList.add('on');
		});

		function getText() { return rawLines.join('\n') }
		function copyMenu() {
			navigator.clipboard.writeText(getText()).then(() => setStatus('Copié !', 'ok'));
		}
		async function pushToSupabase() {
			const email = document.getElementById('emailBox').value.trim();
			const pw = document.getElementById('passwordBox').value;
			if (!email || !pw) { setStatus('Email et mot de passe requis.', 'err'); return; }
			setStatus('Connexion…', '');
			try {
				const { error: e1 } = await _sb.auth.signInWithPassword({ email, password: pw });
				if (e1) throw e1;
				const content = getText();
				const { error: e2 } = await _sb.from('menu.menu').insert([{ content }]);
				if (e2) throw e2;
				savedText = content; setStatus('✓ Publié !', 'ok');
			} catch (err) { setStatus('Erreur : ' + (err.message || err), 'err'); }
		}
		function setStatus(msg, cls) {
			const el = document.getElementById('status');
			el.textContent = msg; el.className = cls || '';
			if (cls === 'ok') setTimeout(() => { el.textContent = ''; el.className = ''; }, 3500);
		}

		async function init() {
			setStatus('Chargement…', '');
			let text = '';
			try {
				if (_sb) {
					const { data, error } = await _sb.from('menu.menu').select('content').limit(1).order('id', { ascending: false });
					if (!error && data?.[0]?.content) { text = data[0].content; setStatus('Chargé depuis Supabase', 'ok'); }
					else throw 0;
				} else throw 0;
			} catch {
				try {
					text = await (await fetch('menu.menu', { cache: 'no-cache' })).text();
					setStatus('Fichier local chargé', 'ok');
				} catch { setStatus('Impossible de charger le menu.', 'err'); }
			}
			savedText = text;
			rawLines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
			renderAll();
		}

		init();
	</script>
